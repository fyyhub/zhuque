version: '3.8'

services:
  zhuque:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhuque
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/db/zhuque.db
      - RUST_LOG=info
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
